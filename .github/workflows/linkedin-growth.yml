name: LinkedIn Growth Agent

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Notion writes)"
        type: boolean
        default: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: linkedin-growth-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: linkedin-growth-agent/package-lock.json

      - run: npm ci

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_LEADS_DS_ID: ${{ secrets.NOTION_LEADS_DS_ID }}
          NOTION_POSTS_DS_ID: ${{ secrets.NOTION_POSTS_DS_ID }}
          NOTION_DM_DRAFTS_DS_ID: ${{ secrets.NOTION_DM_DRAFTS_DS_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTOR_ID: ${{ secrets.APIFY_ACTOR_ID }}
          APIFY_ACTOR_INPUT: ${{ secrets.APIFY_ACTOR_INPUT }}
          INGEST_MAX_PER_RUN: "30"
          CLAUDE_MODEL: claude-sonnet-4-6
          USDJPY: "150"
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: npm run agent
