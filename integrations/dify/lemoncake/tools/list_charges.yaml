identity:
  author: lemoncake
  name: list_charges
  label:
    en_US: List Charges
    ja_JP: 課金履歴を取得
    zh_Hans: 查询扣款历史
description:
  human:
    en_US: Return the buyer's most recent charges — service, amount (USDC), timestamp, and whether they were sandboxed.
    ja_JP: 購入者の直近の課金履歴を返します（サービス名・金額・日時・サンドボックス判定）。
    zh_Hans: 返回购买者最近的扣款记录（服务、金额、时间、是否沙盒）。
  llm: |
    Query recent charges on this buyer account. Useful when the agent
    needs to summarize what it has spent, build an invoice, or debug
    why a balance is lower than expected.
parameters:
  - name: limit
    type: number
    required: false
    default: 20
    form: llm
    label:
      en_US: Max rows
      ja_JP: 最大件数
      zh_Hans: 最大条数
    human_description:
      en_US: How many recent charges to return (1–100).
      ja_JP: 取得する件数 (1–100)。
      zh_Hans: 返回的最近扣款条数 (1–100)。
    llm_description: Max number of rows to return (1-100).
extra:
  python:
    source: tools/list_charges.py
