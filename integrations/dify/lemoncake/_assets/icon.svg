<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="LemonCake">
  <!-- Brand yellow rounded background -->
  <rect width="64" height="64" rx="14" fill="#FFE14A"/>

  <!-- Lemon slice: outer rind ring + pale pulp -->
  <circle cx="32" cy="32" r="22" fill="#FFD838"/>
  <circle cx="32" cy="32" r="20.5" fill="#FFF7C2"/>

  <!-- Pulp segment dividers (8 wedges) -->
  <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round">
    <line x1="32" y1="13" x2="32" y2="51"/>
    <line x1="13" y1="32" x2="51" y2="32"/>
    <line x1="18.5" y1="18.5" x2="45.5" y2="45.5"/>
    <line x1="45.5" y1="18.5" x2="18.5" y2="45.5"/>
  </g>

  <!-- Center seed -->
  <circle cx="32" cy="32" r="3" fill="#FFFFFF"/>
  <circle cx="32" cy="32" r="1.4" fill="#FFD838"/>
</svg>
